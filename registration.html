            .nav-container {
                margin-top: -50px;
            }

            width: 50px;
            height: 50px;

        }

            flex-wrap: wrap;

            color: #fff;
            font-size: 1.1rem;
        }

            .footer-item {
                flex: 1 1 100%;
            }
        }

    <style>
.header{

}
.main-container {

/* Small screens */
