<!DOCTYPE html>
<html>
<head>
    <title>Navigation Links</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>


.nav-container {
    display: flex;
    justify-content: center;
    align-items: center;
}

.nav-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0 25px;
    text-align: center;
    text-decoration: none;
    padding: 10px 30px;
    background-color: rgb(228, 188, 172);
    border-radius: 20px;
    transition: background-color 0.3s ease;
    /*add box shadow */
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
}

.nav-link:hover {
    background-color: rgb(209, 144, 135);
}

.nav-link img {
    width: 150px;
    height: 150px;
    margin-bottom: 10px;

}

.nav-link span {
    font-size: 27px;
    color: rgb(95, 35, 27);
}

/* Add additional styling as needed */

</style> 
 </head>
<body>

<div class="nav-container">
  
    <a href="index.html" class="nav-link">
        <img src="img/about.png" alt="Icon 1">
        <span>Link 1</span>
    </a>
    <a href="index.html" class="nav-link">
        <img src="img/Call-for-Paper.png" alt="Icon 2">
        <span>Link 2</span>
    </a>
    <a href="index.html" class="nav-link">
        <img src="img/Plenary-Speakers.png" alt="Icon 3">
        <span>Link 3</span>
    </a>
</div>

</body>
</html>
